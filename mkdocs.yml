site_name: quantile-guard
site_description: Non-crossing quantile models with built-in inference, calibration, and evaluation.
site_url: https://joshvern.github.io/quantile-guard/
repo_url: https://github.com/joshvern/quantile-guard
repo_name: joshvern/quantile-guard
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - navigation.sections
    - content.code.copy

nav:
  - Home: index.md
  - Usage Guide: usage.md
  - Workflows:
    - Evaluation: evaluation.md
    - Crossing: crossing.md
    - Conformal: conformal.md
    - Calibration: calibration.md
  - Benchmarks: benchmarks.md
  - API Reference: api.md
  - Theory: theory.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
